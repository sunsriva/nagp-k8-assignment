apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: nagp-k8s
  labels:
    app: nagp-assignment
    tier: database
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS products (
      id             SERIAL PRIMARY KEY,
      name           VARCHAR(100)   NOT NULL,
      category       VARCHAR(50)    NOT NULL,
      price          DECIMAL(10, 2) NOT NULL,
      stock_quantity INTEGER        NOT NULL DEFAULT 0,
      description    TEXT,
      created_at     TIMESTAMP      NOT NULL DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO products (name, category, price, stock_quantity, description) VALUES
      ('Laptop Pro 15',               'Electronics', 1299.99, 50,  'High-performance laptop with 16 GB RAM and 512 GB SSD'),
      ('Wireless Ergonomic Keyboard', 'Electronics',   79.99, 200, 'Compact wireless keyboard with backlit keys'),
      ('Height-Adjustable Desk',      'Furniture',    599.99,  30, 'Electric sit-stand desk with memory presets'),
      ('Programmable Coffee Maker',   'Appliances',   149.99,  75, '12-cup drip coffee maker with built-in grinder'),
      ('Ergonomic Office Chair',      'Furniture',    349.99,  40, 'Mesh-back chair with adjustable lumbar support'),
      ('7-in-1 USB-C Hub',            'Electronics',   49.99, 150, 'HDMI 4K, 3×USB-A, SD/microSD, 100 W PD'),
      ('Noise-Cancelling Headphones', 'Electronics',  249.99,  60, 'ANC headphones with 30 h battery and foldable design')
    ON CONFLICT DO NOTHING;
